<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>ProceduralHaptics Demo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="nav-links"
        style="display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap;">
        <a href="index.html" class="nav-link"
            style="padding: 8px 16px; background: #333; color: white; text-decoration: none; border-radius: 4px; font-size: 0.9rem;">Main
            Demo</a>
        <a href="buttons.html" class="nav-link"
            style="padding: 8px 16px; background: #333; color: white; text-decoration: none; border-radius: 4px; font-size: 0.9rem;">UI
            Elements</a>
        <a href="drawing.html" class="nav-link"
            style="padding: 8px 16px; background: #333; color: white; text-decoration: none; border-radius: 4px; font-size: 0.9rem;">Drawing</a>
        <a href="mario.html" class="nav-link"
            style="padding: 8px 16px; background: #333; color: white; text-decoration: none; border-radius: 4px; font-size: 0.9rem;">Mario-like</a>
        <a href="pong.html" class="nav-link"
            style="padding: 8px 16px; background: #333; color: white; text-decoration: none; border-radius: 4px; font-size: 0.9rem;">Pong</a>
    </div>

    <h1>ProceduralHaptics デザイナー</h1>

    <!-- Waveform Visualizer -->
    <canvas id="hapticCanvas"
        style="width: 100%; height: 100px; background: #000; border: 2px solid #333; border-radius: 8px; margin-bottom: 20px; box-sizing: border-box;"></canvas>

    <div class="ai-panel">
        <h2>🤖 AI 質感ジェネレーター</h2>
        <input type="password" id="apiKey" placeholder="Gemini API Key を入力">
        <input type="text" id="aiPrompt" placeholder="例: ザラザラしたアスファルト, 氷の上を滑る感覚">
        <button id="generateBtn">AIで質感を生成</button>
        <div id="aiStatus"></div>
    </div>

    <div id="touchPad">
        <div id="puck">Drag Me!</div>
    </div>

    <div id="sliders">
        <!-- スライダー群（JavaScriptで動的に生成・制御します） -->
    </div>

    <div style="margin-top: 20px; display: flex; gap: 10px; align-items: center; justify-content: center;">
        <button id="playBtn" style="flex: 1;">Play / エンジン起動</button>
        <select id="audioDeviceSelect"
            style="flex: 1; padding: 12px; border-radius: 6px; background: #333; color: white; border: 1px solid #555;">
            <option value="">Default Audio</option>
        </select>
        <button id="refreshDevicesBtn" style="padding: 12px; width: auto;" title="Refresh Devices">🔄</button>
    </div>

    <script type="module">
        import { HapticEngine, HapticAI, GamepadManager, HapticVisualizer } from '../src/ProceduralHaptics.js';

        const haptics = new HapticEngine();
        const gamepad = new GamepadManager();
        const visualizer = new HapticVisualizer(haptics, document.getElementById('hapticCanvas'));

        // --- Audio Device Selection (HD Haptics Routing) ---
        const audioSelect = document.getElementById('audioDeviceSelect');
        const refreshBtn = document.getElementById('refreshDevicesBtn');

        const populateAudioDevices = async () => {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const audioOutputs = devices.filter(d => d.kind === 'audiooutput');

                audioSelect.innerHTML = '<option value="">Default Audio</option>';
                audioOutputs.forEach(device => {
                    if (device.deviceId) {
                        const opt = document.createElement('option');
                        opt.value = device.deviceId;
                        let label = device.label || `Device ${audioSelect.length}`;
                        if (label.toLowerCase().includes('wireless controller')) label = `🎮 DualSense (${label})`;
                        opt.textContent = label;
                        audioSelect.appendChild(opt);
                    }
                });
            } catch (err) {
                console.warn('Could not enumerate audio devices:', err);
            }
        };

        refreshBtn.addEventListener('click', populateAudioDevices);
        navigator.mediaDevices.addEventListener('devicechange', populateAudioDevices);

        audioSelect.addEventListener('change', async (e) => {
            const success = await haptics.setAudioSink(e.target.value);
            if (!success) {
                alert("Failed to route audio.");
                e.target.value = "";
            }
        });

        // --- UIセットアップ ---
        const paramsConfig = [
            { id: 'granularity', label: '粒感 (滑らか - ツブツブ)' },
            { id: 'roughness', label: 'ザラザラ (すべすべ - ザラザラ)' },
            { id: 'state', label: '固体 (液体 - 固体)' },
            { id: 'hardness', label: '硬さ (柔らかい - 硬い)' },
            { id: 'weight', label: '重さ (重い - 軽い)' },
            { id: 'viscosity', label: '粘度 (サラサラ - ネバネバ)' }
        ];

        const slidersDiv = document.getElementById('sliders');
        paramsConfig.forEach(conf => {
            const div = document.createElement('div');
            div.className = 'control-group';
            div.innerHTML = `
                <label><span>${conf.label}</span></label>
                <input type="range" id="${conf.id}" min="0" max="1" step="0.01" value="0.5">
            `;
            slidersDiv.appendChild(div);

            const slider = document.getElementById(conf.id);
            slider.addEventListener('input', () => {
                haptics.setParams({ [conf.id]: parseFloat(slider.value) });
            });
        });

        const updateAllParams = () => {
            const currentParams = {};
            paramsConfig.forEach(conf => currentParams[conf.id] = parseFloat(document.getElementById(conf.id).value));
            haptics.setParams(currentParams);
        };
        updateAllParams();

        // --- エンジン制御 ---
        const playBtn = document.getElementById('playBtn');
        playBtn.addEventListener('click', async () => {
            const isPlaying = await haptics.togglePlay();
            playBtn.textContent = isPlaying ? 'Stop / 停止' : 'Play / エンジン起動';
            if (isPlaying) {
                playBtn.classList.add('playing');
                if (audioSelect.options.length <= 1) populateAudioDevices();
                visualizer.start();
            } else {
                playBtn.classList.remove('playing');
                visualizer.stop();
            }
        });

        // --- ドラッグ制御 (UIと物理演算) ---
        const puck = document.getElementById('puck');
        const touchPad = document.getElementById('touchPad');
        let isDragging = false;
        let lastX = 0, lastY = 0, lastTime = 0, prevVel = 0;

        const startDrag = (x, y) => { isDragging = true; lastX = x; lastY = y; lastTime = performance.now(); prevVel = 0; };
        const moveDrag = (x, y) => {
            if (!isDragging) return;
            const now = performance.now();
            const dt = now - lastTime;
            let rawVel = 0;
            if (dt > 0) {
                const dist = Math.hypot(x - lastX, y - lastY);
                rawVel = Math.min((dist / dt) * 1.5, 5.0);
            }
            haptics.setVelocity(rawVel);

            // 衝突判定 (加速度)
            if (prevVel - rawVel > 0.8 && prevVel > 0.5) {
                haptics.triggerCollision(Math.min((prevVel - rawVel) / 3.0, 1.0));
                puck.classList.add('collision');
                setTimeout(() => puck.classList.remove('collision'), 150);
            }
            prevVel = rawVel;

            lastX = x; lastY = y; lastTime = now;

            const rect = touchPad.getBoundingClientRect();
            let px = Math.max(0, Math.min(x - rect.left - 40, rect.width - 80));
            let py = Math.max(0, Math.min(y - rect.top - 40, rect.height - 80));
            puck.style.left = px + 'px'; puck.style.top = py + 'px';
        };
        const endDrag = () => { isDragging = false; };

        puck.addEventListener('mousedown', e => startDrag(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY));
        window.addEventListener('mouseup', endDrag);

        // Gamepad Loop for Puck
        let padX = 50, padY = 50; // Initial percentage
        const updateGamepad = () => {
            const padState = gamepad.getState();
            if (padState.connected) {
                const deadzone = 0.1;
                let dx = 0, dy = 0;
                if (Math.abs(padState.axes[0]) > deadzone) dx = padState.axes[0];
                if (Math.abs(padState.axes[1]) > deadzone) dy = padState.axes[1];

                if (dx !== 0 || dy !== 0) {
                    const rect = touchPad.getBoundingClientRect();
                    // Calculate current absolute position
                    let currentX = (padX / 100) * (rect.width - 80);
                    let currentY = (padY / 100) * (rect.height - 80);

                    // Speed factor
                    const speed = 10;
                    currentX += dx * speed;
                    currentY += dy * speed;

                    // Convert back to percentage for style or just absolute
                    let px = Math.max(0, Math.min(currentX, rect.width - 80));
                    let py = Math.max(0, Math.min(currentY, rect.height - 80));

                    padX = (px / (rect.width - 80)) * 100;
                    padY = (py / (rect.height - 80)) * 100;

                    // Trigger moveDrag logic virtually to get haptics
                    if (!isDragging) {
                        isDragging = true;
                        lastTime = performance.now();
                        lastX = px + rect.left + 40;
                        lastY = py + rect.top + 40;
                    } else {
                        moveDrag(px + rect.left + 40, py + rect.top + 40);
                    }
                } else if (isDragging && !keysPressed()) {
                    // Need a way to differentiate mouse drag vs gamepad stop. 
                    // Simple hack: if stopping gamepad, just stop haptics
                    haptics.setVelocity(0);
                    isDragging = false;
                }
            }
            requestAnimationFrame(updateGamepad);
        };
        requestAnimationFrame(updateGamepad);

        // Helper to check if mouse is actually down (very basic)
        const keysPressed = () => { return false; }; // Placeholder

        setInterval(() => {
            if (!isDragging || performance.now() - lastTime > 50) haptics.setVelocity(0);
        }, 30);

        // --- AI連携 ---
        const aiStatus = document.getElementById('aiStatus');
        document.getElementById('generateBtn').addEventListener('click', async (e) => {
            const apiKey = document.getElementById('apiKey').value.trim();
            const prompt = document.getElementById('aiPrompt').value.trim();
            if (!apiKey || !prompt) return alert("APIキーとプロンプトを入力してください");

            e.target.disabled = true;
            aiStatus.textContent = "Gemini APIに問い合わせ中...";
            aiStatus.className = "loading";

            const ai = new HapticAI(apiKey);
            try {
                const params = await ai.generateParams(prompt);
                haptics.setParams(params);
                paramsConfig.forEach(conf => {
                    if (params[conf.id] !== undefined) {
                        document.getElementById(conf.id).value = params[conf.id];
                        document.getElementById(conf.id).dispatchEvent(new Event('input'));
                    }
                });
                aiStatus.textContent = `✅ 質感を適用しました: 「${prompt}」`;
                aiStatus.className = "success";
            } catch (err) {
                aiStatus.textContent = `❌ エラー: ${err.message}`;
                aiStatus.className = "error";
            } finally {
                e.target.disabled = false;
            }
        });
    </script>
</body>

</html>
