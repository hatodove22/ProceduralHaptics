<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>ProceduralHaptics - Mario-like Demo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #gameContainer {
            width: 100%;
            height: 400px;
            background: #87CEEB;
            /* Sky blue */
            border: 2px solid #444;
            border-radius: 8px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            touch-action: none;
        }

        #mario {
            width: 30px;
            height: 40px;
            background: #E52521;
            /* Mario Red */
            position: absolute;
            bottom: 50px;
            /* initial ground level */
            left: 50px;
            border-radius: 4px 4px 0 0;
            box-shadow: inset -4px -4px 0 rgba(0, 0, 0, 0.2);
            transition: transform 0.1s;
        }

        #mario::before {
            content: '';
            position: absolute;
            top: 5px;
            right: 5px;
            width: 10px;
            height: 10px;
            background: #FFCC99;
            border-radius: 50%;
            /* Face */
        }

        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50px;
            background: #8B4513;
            /* Dirt brown */
            border-top: 10px solid #228B22;
            /* Grass green */
        }

        .block {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #CD853F;
            border: 2px solid #8B4513;
            box-sizing: border-box;
            box-shadow: inset 2px 2px 0 rgba(255, 255, 255, 0.3), inset -2px -2px 0 rgba(0, 0, 0, 0.3);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .ctrl-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            background: #333;
            color: white;
            border: none;
            border-radius: 8px;
            user-select: none;
            cursor: pointer;
        }

        .ctrl-btn:active {
            background: #555;
            transform: scale(0.95);
        }

        .nav-links {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 8px 16px;
            background: #333;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .nav-link:hover {
            background: #555;
        }

        .nav-link.active {
            background: #0070cc;
        }
    </style>
</head>

<body>
    <div class="nav-links">
        <a href="index.html" class="nav-link">Main Demo</a>
        <a href="buttons.html" class="nav-link">UI Elements</a>
        <a href="drawing.html" class="nav-link">Drawing</a>
        <a href="mario.html" class="nav-link active">Mario-like</a>
        <a href="pong.html" class="nav-link">Pong</a>
    </div>

    <h1>Mario-like Haptics Demo</h1>
    <p style="text-align:center; color:#ccc; margin-bottom: 20px;">Use Left/Right arrows and SPACE to jump, or use the
        on-screen buttons. Feel the footsteps and impacts.</p>

    <!-- Waveform Visualizer -->
    <canvas id="hapticCanvas"
        style="width: 100%; height: 100px; background: #000; border: 2px solid #333; border-radius: 8px; margin-bottom: 20px; box-sizing: border-box;"></canvas>

    <div style="margin-bottom: 20px; display: flex; gap: 10px; align-items: center; justify-content: center;">
        <button id="playBtn" style="flex: 1;">Play / エンジン起動</button>
        <select id="audioDeviceSelect"
            style="flex: 1; padding: 12px; border-radius: 6px; background: #333; color: white; border: 1px solid #555;">
            <option value="">Default Audio</option>
        </select>
        <button id="refreshDevicesBtn" style="padding: 12px; width: auto;" title="Refresh Devices">🔄</button>
    </div>

    <div id="gameContainer">
        <div class="ground" id="ground"></div>
        <!-- Some Blocks to jump on/hit -->
        <div class="block" style="left: 200px; bottom: 120px;" id="block1"></div>
        <div class="block" style="left: 240px; bottom: 120px;" id="block2"></div>
        <div class="block" style="left: 350px; bottom: 180px;" id="block3"></div>
        <div id="mario"></div>
    </div>

    <div class="controls">
        <button class="ctrl-btn" id="btnLeft">◀ Left</button>
        <button class="ctrl-btn" id="btnRight">Right ▶</button>
        <button class="ctrl-btn" id="btnJump" style="background:#e52521;">JUMP</button>
    </div>

    <script type="module">
        import { HapticEngine, GamepadManager, HapticVisualizer } from '../src/ProceduralHaptics.js';

        const haptics = new HapticEngine();
        const gamepad = new GamepadManager();
        const visualizer = new HapticVisualizer(haptics, document.getElementById('hapticCanvas'));

        // --- Audio Device Selection (HD Haptics Routing) ---
        const audioSelect = document.getElementById('audioDeviceSelect');
        const refreshBtn = document.getElementById('refreshDevicesBtn');

        const populateAudioDevices = async () => {
            try {
                // Request permission first if needed (usually happens on first gUM or play)
                const devices = await navigator.mediaDevices.enumerateDevices();
                const audioOutputs = devices.filter(d => d.kind === 'audiooutput');

                audioSelect.innerHTML = '<option value="">Default Audio</option>';
                audioOutputs.forEach(device => {
                    if (device.deviceId) {
                        const opt = document.createElement('option');
                        opt.value = device.deviceId;
                        // Identify DualSense and highlight it
                        let label = device.label || `Device ${audioSelect.length}`;
                        if (label.toLowerCase().includes('wireless controller')) {
                            label = `🎮 DualSense (${label})`;
                        }
                        opt.textContent = label;
                        audioSelect.appendChild(opt);
                    }
                });
            } catch (err) {
                console.warn('Could not enumerate audio devices:', err);
            }
        };

        refreshBtn.addEventListener('click', populateAudioDevices);
        navigator.mediaDevices.addEventListener('devicechange', populateAudioDevices);

        audioSelect.addEventListener('change', async (e) => {
            const success = await haptics.setAudioSink(e.target.value);
            if (!success) {
                alert("Failed to route audio. Ensure you have granted permissions and are using a supported browser (Chrome/Edge).");
                e.target.value = ""; // Reset
            }
        });

        // --- エンジン制御 ---
        const playBtn = document.getElementById('playBtn');
        playBtn.addEventListener('click', async () => {
            const isPlaying = await haptics.togglePlay();
            playBtn.textContent = isPlaying ? 'Stop / 停止' : 'Play / エンジン起動';
            if (isPlaying) {
                playBtn.classList.add('playing');
                // Try to populate devices on first user interaction
                if (audioSelect.options.length <= 1) populateAudioDevices();
                visualizer.start();
            } else {
                playBtn.classList.remove('playing');
                visualizer.stop();
            }
        });

        // --- Haptic Profiles ---
        const HAPTICS_WALK = { granularity: 0.6, roughness: 0.4, state: 0.8, hardness: 0.5, weight: 0.3, viscosity: 0.0 };
        const HAPTICS_JUMP = { granularity: 0.9, roughness: 0.1, state: 1.0, hardness: 0.8, weight: 0.8, viscosity: 0.0 };
        const HAPTICS_LAND = { granularity: 0.4, roughness: 0.6, state: 1.0, hardness: 0.9, weight: 0.1, viscosity: 0.0 };
        const HAPTICS_BONK = { granularity: 0.2, roughness: 0.2, state: 1.0, hardness: 1.0, weight: 0.5, viscosity: 0.0 }; // Hitting a block from below

        const triggerHapticEvent = async (params, intensity = 1.0) => {
            if (!haptics.isPlaying) return;
            const oldParams = { ...haptics.params };
            haptics.setParams(params);
            haptics.triggerCollision(intensity);
            setTimeout(() => { haptics.setParams(oldParams); }, 100);
        };

        // --- Game Logic ---
        const mario = document.getElementById('mario');
        const container = document.getElementById('gameContainer');

        // Simple Physics State
        let player = {
            x: 50, y: 50, // y is measured from bottom
            vx: 0, vy: 0,
            width: 30, height: 40,
            speed: 4, gravity: -0.6, jumpPower: 12,
            isGrounded: true,
            facingRight: true
        };

        const keys = { left: false, right: false, up: false };

        const blocks = [
            { x: 200, y: 120, w: 40, h: 40 },
            { x: 240, y: 120, w: 40, h: 40 },
            { x: 350, y: 180, w: 40, h: 40 }
        ];

        // --- Input Handling ---
        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft') keys.left = true;
            if (e.code === 'ArrowRight') keys.right = true;
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                if (player.isGrounded) jump();
                e.preventDefault();
            }
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft') keys.left = false;
            if (e.code === 'ArrowRight') keys.right = false;
        });

        // Touch/Mouse Controls
        const btnL = document.getElementById('btnLeft');
        const btnR = document.getElementById('btnRight');
        const btnJ = document.getElementById('btnJump');

        btnL.addEventListener('mousedown', () => keys.left = true);
        btnL.addEventListener('mouseup', () => keys.left = false);
        btnL.addEventListener('mouseleave', () => keys.left = false);
        btnL.addEventListener('touchstart', (e) => { e.preventDefault(); keys.left = true; });
        btnL.addEventListener('touchend', (e) => { e.preventDefault(); keys.left = false; });

        btnR.addEventListener('mousedown', () => keys.right = true);
        btnR.addEventListener('mouseup', () => keys.right = false);
        btnR.addEventListener('mouseleave', () => keys.right = false);
        btnR.addEventListener('touchstart', (e) => { e.preventDefault(); keys.right = true; });
        btnR.addEventListener('touchend', (e) => { e.preventDefault(); keys.right = false; });

        btnJ.addEventListener('mousedown', () => { if (player.isGrounded) jump(); });
        btnJ.addEventListener('touchstart', (e) => { e.preventDefault(); if (player.isGrounded) jump(); });

        const jump = () => {
            player.vy = player.jumpPower;
            player.isGrounded = false;
            triggerHapticEvent(HAPTICS_JUMP, 0.7);

            // Temporary scale effect
            mario.style.transform = `scaleY(1.2) scaleX(0.8) ${player.facingRight ? '' : 'scaleX(-1)'}`;
            setTimeout(() => resetTransform(), 150);
        };

        const resetTransform = () => {
            mario.style.transform = player.facingRight ? 'scaleX(1)' : 'scaleX(-1)';
        };

        // --- Physics Loop ---
        let lastTime = performance.now();
        const update = () => {
            const now = performance.now();
            const dt = Math.min((now - lastTime) / 16.6, 2); // normalize to roughly 60fps, cap at 2 frames
            lastTime = now;

            // Horizontal movement
            if (keys.left) { player.vx = -player.speed; player.facingRight = false; }
            else if (keys.right) { player.vx = player.speed; player.facingRight = true; }
            else { player.vx = 0; }

            // Apply horizontal Haptics (footsteps)
            if (player.isGrounded && Math.abs(player.vx) > 0 && haptics.isPlaying) {
                haptics.setParams(HAPTICS_WALK);
                haptics.setVelocity(Math.abs(player.vx));
            } else {
                haptics.setVelocity(0); // Stop walking vibration
            }

            player.x += player.vx * dt;

            // Screen boundaries
            if (player.x < 0) player.x = 0;
            if (player.x > container.clientWidth - player.width) player.x = container.clientWidth - player.width;

            // Vertical movement
            player.vy += player.gravity * dt;
            player.y += player.vy * dt;

            // Floor collision
            let groundLevel = 50; // Ground height
            let landHit = false;

            // Check Block collisions
            let onBlock = false;
            for (let block of blocks) {
                // simple AABB (remember y is from bottom)
                // player rect: x to x+w, y to y+h
                // block rect: bx to bx+bw, by to by+bh

                // Horizontal overlap
                if (player.x + player.width > block.x && player.x < block.x + block.w) {
                    // Landing on top
                    if (player.y <= block.y + block.h && player.y - player.vy * dt >= block.y + block.h) {
                        player.y = block.y + block.h;
                        player.vy = 0;
                        onBlock = true;
                        if (!player.isGrounded) landHit = true;
                    }
                    // Bonking from below
                    else if (player.y + player.height >= block.y && player.y + player.height - player.vy * dt <= block.y) {
                        player.y = block.y - player.height;
                        player.vy = 0;
                        triggerHapticEvent(HAPTICS_BONK, 1.0); // Head hit block

                        // Visual bump for the block we hit
                        const el = document.getElementById(block === blocks[0] ? 'block1' : block === blocks[1] ? 'block2' : 'block3');
                        el.style.transform = 'translateY(-5px)';
                        setTimeout(() => el.style.transform = 'translateY(0)', 100);
                    }
                }
            }

            if (!onBlock && player.y <= groundLevel) {
                player.y = groundLevel;
                player.vy = 0;
                if (!player.isGrounded) landHit = true;
            }

            if (landHit) {
                player.isGrounded = true;
                triggerHapticEvent(HAPTICS_LAND, 0.9); // Heavy land

                // Squash effect
                mario.style.transform = `scaleY(0.7) scaleX(1.3) ${player.facingRight ? '' : 'scaleX(-1)'}`;
                setTimeout(() => resetTransform(), 100);
            } else if (player.vy !== 0) {
                player.isGrounded = false;
            }

            resetTransform(); // ensure right direction if no squish is playing

            // Apply Render
            mario.style.left = player.x + 'px';
            mario.style.bottom = player.y + 'px';

            requestAnimationFrame(update);
        };

        requestAnimationFrame(update);

    </script>
</body>

</html>
