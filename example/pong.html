<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>ProceduralHaptics - Pong Materials Demo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #pongCanvas {
            width: 100%;
            height: 400px;
            background: #111;
            border: 2px solid #555;
            border-radius: 8px;
            margin-bottom: 20px;
            display: block;
            touch-action: none;
        }

        .material-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .mat-btn {
            flex: 1;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .mat-btn:active {
            transform: scale(0.95);
        }

        .mat-ice {
            background: #00bcd4;
            border-bottom: 4px solid #008ba3;
        }

        .mat-rubber {
            background: #f44336;
            border-bottom: 4px solid #d32f2f;
        }

        .mat-metal {
            background: #9e9e9e;
            border-bottom: 4px solid #757575;
            color: #000;
        }

        .mat-btn.active {
            box-shadow: 0 0 15px currentColor;
            transform: translateY(2px);
            border-bottom-width: 2px;
        }

        .nav-links {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 8px 16px;
            background: #333;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .nav-link:hover {
            background: #555;
        }

        .nav-link.active {
            background: #0070cc;
        }
    </style>
</head>

<body>
    <div class="nav-links">
        <a href="index.html" class="nav-link">Main Demo</a>
        <a href="buttons.html" class="nav-link">UI Elements</a>
        <a href="drawing.html" class="nav-link">Drawing</a>
        <a href="mario.html" class="nav-link">Mario-like</a>
        <a href="pong.html" class="nav-link active">Pong</a>
    </div>

    <h1>Material Pong Haptics</h1>
    <p style="text-align:center; color:#ccc; margin-bottom: 20px;">Move the paddle with your mouse/finger to hit the
        ball. Change the ball material to feel different collision impacts!</p>

    <!-- Waveform Visualizer -->
    <canvas id="hapticCanvas"
        style="width: 100%; height: 100px; background: #000; border: 2px solid #333; border-radius: 8px; margin-bottom: 20px; box-sizing: border-box;"></canvas>

    <div style="margin-bottom: 20px; display: flex; gap: 10px; align-items: center; justify-content: center;">
        <button id="playBtn" style="flex: 1;">Play / エンジン起動</button>
        <select id="audioDeviceSelect"
            style="flex: 1; padding: 12px; border-radius: 6px; background: #333; color: white; border: 1px solid #555;">
            <option value="">Default Audio</option>
        </select>
        <button id="refreshDevicesBtn" style="padding: 12px; width: auto;" title="Refresh Devices">🔄</button>
    </div>

    <div class="material-selector">
        <button class="mat-btn mat-ice active" data-mat="ice">🧊 ICE</button>
        <button class="mat-btn mat-rubber" data-mat="rubber">🔴 RUBBER</button>
        <button class="mat-btn mat-metal" data-mat="metal">⚙️ METAL</button>
    </div>

    <canvas id="pongCanvas"></canvas>

    <script type="module">
        import { HapticEngine, GamepadManager, HapticVisualizer } from '../src/ProceduralHaptics.js';

        const haptics = new HapticEngine();
        const gamepad = new GamepadManager();
        const visualizer = new HapticVisualizer(haptics, document.getElementById('hapticCanvas'));

        // --- Audio Device Selection (HD Haptics Routing) ---
        const audioSelect = document.getElementById('audioDeviceSelect');
        const refreshBtn = document.getElementById('refreshDevicesBtn');

        const populateAudioDevices = async () => {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const audioOutputs = devices.filter(d => d.kind === 'audiooutput');

                audioSelect.innerHTML = '<option value="">Default Audio</option>';
                audioOutputs.forEach(device => {
                    if (device.deviceId) {
                        const opt = document.createElement('option');
                        opt.value = device.deviceId;
                        let label = device.label || `Device ${audioSelect.length}`;
                        if (label.toLowerCase().includes('wireless controller')) label = `🎮 DualSense (${label})`;
                        opt.textContent = label;
                        audioSelect.appendChild(opt);
                    }
                });
            } catch (err) {
                console.warn('Could not enumerate audio devices:', err);
            }
        };

        refreshBtn.addEventListener('click', populateAudioDevices);
        navigator.mediaDevices.addEventListener('devicechange', populateAudioDevices);

        audioSelect.addEventListener('change', async (e) => {
            const success = await haptics.setAudioSink(e.target.value);
            if (!success) {
                alert("Failed to route audio.");
                e.target.value = "";
            }
        });

        // --- エンジン制御 ---
        const playBtn = document.getElementById('playBtn');
        playBtn.addEventListener('click', async () => {
            const isPlaying = await haptics.togglePlay();
            playBtn.textContent = isPlaying ? 'Stop / 停止' : 'Play / エンジン起動';
            if (isPlaying) {
                playBtn.classList.add('playing');
                if (audioSelect.options.length <= 1) populateAudioDevices();
                visualizer.start();
            } else {
                playBtn.classList.remove('playing');
                visualizer.stop();
            }
        });

        // --- Haptic Materials ---
        const materials = {
            ice: {
                color: '#84ffff',
                speedMultiplier: 1.2,
                bounceDrag: 1.0, // perfect elastic
                haptic: { granularity: 0.0, roughness: 0.1, state: 1.0, hardness: 0.9, weight: 0.9, viscosity: 0.0 } // Sharp, high pitch glass tink
            },
            rubber: {
                color: '#ff5252',
                speedMultiplier: 0.9,
                bounceDrag: 1.05, // adds bounce speed
                haptic: { granularity: 0.4, roughness: 0.2, state: 1.0, hardness: 0.2, weight: 0.3, viscosity: 0.3 } // dull, low pitch thud
            },
            metal: {
                color: '#e0e0e0',
                speedMultiplier: 1.4,
                bounceDrag: 0.9, // absorbs speed slightly
                haptic: { granularity: 0.9, roughness: 0.8, state: 1.0, hardness: 1.0, weight: 0.5, viscosity: 0.0 } // harsh, heavy metal clank
            }
        };

        let currentMaterialId = 'ice';

        document.querySelectorAll('.mat-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.mat-btn').forEach(b => b.classList.remove('active'));
                const btnEl = e.target.closest('.mat-btn'); // Handle emoji clicks
                btnEl.classList.add('active');
                currentMaterialId = btnEl.dataset.mat;
            });
        });

        const triggerImpact = async (intensity = 1.0) => {
            if (!haptics.isPlaying) return;
            const mat = materials[currentMaterialId].haptic;
            const oldParams = { ...haptics.params };
            haptics.setParams(mat);
            haptics.triggerCollision(intensity);
            setTimeout(() => { haptics.setParams(oldParams); }, 100);
        };

        // --- Pong Game Logic ---
        const canvas = document.getElementById('pongCanvas');
        const ctx = canvas.getContext('2d');

        // Internal resolution mapping
        canvas.width = 800;
        canvas.height = 400;

        let paddle = { x: 50, y: 150, w: 15, h: 100, vy: 0 };
        let enemy = { x: 735, y: 150, w: 15, h: 100, speed: 4 };
        let ball = { x: 400, y: 200, r: 12, vx: -6, vy: 3 };

        // Mouse tracking
        let mouseY = 200;
        let lastMouseY = 200;
        let lastTime = performance.now();

        const updateMousePosition = (e) => {
            const rect = canvas.getBoundingClientRect();
            // Scale client coordinates to internal canvas resolution
            const scaleY = canvas.height / rect.height;
            if (e.touches && e.touches.length > 0) {
                mouseY = (e.touches[0].clientY - rect.top) * scaleY;
            } else {
                mouseY = (e.clientY - rect.top) * scaleY;
            }
        };

        canvas.addEventListener('mousemove', updateMousePosition);
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault(); // Prevent scrolling while playing
            updateMousePosition(e);
        }, { passive: false });

        const resetBall = () => {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.vx = (Math.random() > 0.5 ? 1 : -1) * 6;
            ball.vy = (Math.random() * 6) - 3;
        };

        const update = () => {
            const now = performance.now();
            const dt = Math.min((now - lastTime) / 16.6, 2);
            lastTime = now;

            // Gamepad Polling for paddle
            const padState = gamepad.getState();
            let padInputY = 0;
            if (padState.connected) {
                // Left stick Y or D-PAD Up/Down (Buttons 12/13)
                const deadzone = 0.1;
                if (Math.abs(padState.axes[1]) > deadzone) padInputY = padState.axes[1];
                if (padState.buttons[12]?.pressed) padInputY = -1; // up
                if (padState.buttons[13]?.pressed) padInputY = 1;  // down
            }

            if (padInputY !== 0) {
                // Gamepad direct velocity control
                paddle.vy = padInputY * 8; // Max pad speed
                paddle.y += paddle.vy * dt;
                // Update phantom mouseY so it doesn't snap back as violently if mixed
                mouseY = paddle.y + paddle.h / 2;
            } else {
                // Update Paddle (Follow mouse cleanly)
                paddle.vy = (mouseY - (paddle.y + paddle.h / 2)) * 0.2; // Smooth follow
                paddle.y += paddle.vy * dt;
            }

            // Constrain Player Paddle
            if (paddle.y < 0) paddle.y = 0;
            if (paddle.y > canvas.height - paddle.h) paddle.y = canvas.height - paddle.h;

            // Apply friction feel based on paddle movement
            if (haptics.isPlaying) {
                const speedVal = Math.abs(paddle.vy) * 0.5;
                // Set a light sliding friction param set for background movement
                haptics.setParams({ granularity: 0.0, roughness: 0.1, state: 0.0, hardness: 0.0, weight: 0.1, viscosity: 0.0 });
                haptics.setVelocity(Math.min(speedVal, 3.0));
            }

            // Update Enemy AI
            const predictedY = ball.y;
            if (enemy.y + enemy.h / 2 < predictedY - 10) enemy.y += enemy.speed * dt;
            else if (enemy.y + enemy.h / 2 > predictedY + 10) enemy.y -= enemy.speed * dt;

            // Update Ball with material modifiers
            const mat = materials[currentMaterialId];
            ball.x += ball.vx * mat.speedMultiplier * dt;
            ball.y += ball.vy * mat.speedMultiplier * dt;

            // Top/Bottom Wall Collisions
            if (ball.y - ball.r < 0) {
                ball.y = ball.r;
                ball.vy *= -mat.bounceDrag;
                triggerImpact(0.5); // Wall bounce is weaker
            } else if (ball.y + ball.r > canvas.height) {
                ball.y = canvas.height - ball.r;
                ball.vy *= -mat.bounceDrag;
                triggerImpact(0.5);
            }

            // Paddle Collisions
            // Player Paddle
            if (ball.vx < 0 && ball.x - ball.r < paddle.x + paddle.w && ball.x + ball.r > paddle.x &&
                ball.y > paddle.y && ball.y < paddle.y + paddle.h) {

                ball.x = paddle.x + paddle.w + ball.r;
                ball.vx *= -mat.bounceDrag;

                // Add english (spin) based on where it hit paddle and paddle velocity
                let hitPoint = (ball.y - (paddle.y + paddle.h / 2)) / (paddle.h / 2);
                ball.vy += hitPoint * 3 + (paddle.vy * 0.2);

                triggerImpact(1.0); // Full player impact
            }

            // Enemy Paddle
            if (ball.vx > 0 && ball.x + ball.r > enemy.x && ball.x - ball.r < enemy.x + enemy.w &&
                ball.y > enemy.y && ball.y < enemy.y + enemy.h) {

                ball.x = enemy.x - ball.r;
                ball.vx *= -mat.bounceDrag;
                // We feel the enemy hitting it too, but weaker, as environmental haptics
                triggerImpact(0.4);
            }

            // Scoring / Reset
            if (ball.x < 0 || ball.x > canvas.width) {
                // Hard miss bump
                haptics.setParams({ granularity: 1.0, roughness: 0.5, state: 1.0, hardness: 1.0, weight: 0.0, viscosity: 0.0 });
                if (haptics.isPlaying) haptics.triggerCollision(1.0);
                setTimeout(resetBall, 500); // pause briefly
                ball.x = canvas.width / 2; ball.vx = 0; ball.vy = 0; // stop mid screen
            }

            // Draw
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Net
            ctx.fillStyle = '#444';
            for (let i = 10; i < canvas.height; i += 40) ctx.fillRect(canvas.width / 2 - 2, i, 4, 20);

            // Draw Paddles
            ctx.fillStyle = '#fff';
            ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
            ctx.fillRect(enemy.x, enemy.y, enemy.w, enemy.h);

            // Draw Ball
            ctx.fillStyle = materials[currentMaterialId].color;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
            ctx.fill();

            requestAnimationFrame(update);
        };

        requestAnimationFrame(update);

    </script>
</body>

</html>
